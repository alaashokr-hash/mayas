<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دخول المسؤول - مياس العالمية</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <style>
    :root{
      --brand:#198754;
      --brand2:#22c55e;
      --text:#1f2937;
      --line:#dbe5dd;
      --shadow:0 12px 30px rgba(25,135,84,.12);
    }
    *{box-sizing:border-box;font-family:"Cairo",sans-serif}
    body{
      margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;
      background:linear-gradient(180deg,#f9fbfa 0%,#edf6ef 100%)
    }
    .card{
      width:min(100%,420px);padding:24px;border-radius:24px;background:#fff;box-shadow:var(--shadow);margin:16px
    }
    .form-control{min-height:52px;border-radius:14px;border:1px solid var(--line)}
    .btn-brand{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;border:none;border-radius:14px;font-weight:800;min-height:52px
    }
    .btn-brand:hover{color:#fff;filter:brightness(.98)}
    .toast-wrap{
      position:fixed;top:18px;left:18px;z-index:9999;display:flex;flex-direction:column;gap:10px
    }
    .mini-toast{
      background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 10px 26px rgba(0,0,0,.14);
      border-right:5px solid var(--brand);min-width:240px
    }
    .mini-toast.error{border-right-color:#dc3545}
  </style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div class="card">
    <h4 class="text-center mb-4">دخول المسؤول</h4>

    <form id="loginForm">
      <div class="mb-3">
        <input id="email" class="form-control" type="email" placeholder="البريد الإلكتروني" required>
      </div>

      <div class="mb-3">
        <input id="password" class="form-control" type="password" placeholder="كلمة المرور" required>
      </div>

      <button class="btn btn-brand w-100" id="loginBtn" type="submit">تسجيل الدخول</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { firebaseConfig, ADMIN_EMAILS } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById("loginForm");
    const toastWrap = document.getElementById("toastWrap");
    const loginBtn = document.getElementById("loginBtn");

    function showToast(message, type = "success") {
      const el = document.createElement("div");
      el.className = `mini-toast ${type === "error" ? "error" : ""}`;
      el.innerHTML = `<div>${message}</div>`;
      toastWrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(-8px)";
        el.style.transition = "all .25s ease";
        setTimeout(() => el.remove(), 250);
      }, 3000);
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const email = (user.email || "").toLowerCase();
      if (!ADMIN_EMAILS.map(e => e.toLowerCase()).includes(email)) {
        await signOut(auth);
        showToast("هذا الحساب غير مصرح له", "error");
        return;
      }

      window.location.href = "admin.html";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showToast("يرجى تعبئة البريد وكلمة المرور", "error");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "جارٍ الدخول...";

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const userEmail = (cred.user.email || "").toLowerCase();

        if (!ADMIN_EMAILS.map(e => e.toLowerCase()).includes(userEmail)) {
          await signOut(auth);
          showToast("هذا الحساب غير مصرح له", "error");
          return;
        }

        window.location.href = "admin.html";
      } catch (error) {
        console.error(error);
        showToast("بيانات الدخول غير صحيحة", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "تسجيل الدخول";
      }
    });
  </script>
</body>
</html>
