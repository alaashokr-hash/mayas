<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة المسؤول - مياس العالمية</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root{
      --brand:#198754;
      --brand2:#22c55e;
      --text:#1f2937;
      --muted:#6b7280;
      --shadow:0 12px 30px rgba(25,135,84,.12);
    }
    *{box-sizing:border-box;font-family:"Cairo",sans-serif}
    body{margin:0;background:linear-gradient(180deg,#f9fbfa 0%,#edf6ef 100%);color:var(--text)}
    .shell{max-width:1320px;margin:24px auto;padding:0 12px}
    .hero{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;border-radius:28px;padding:24px;box-shadow:var(--shadow)
    }
    .logo-box{
      width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;font-size:32px;
      border:1px solid rgba(255,255,255,.25)
    }
    .stat-card,.panel{background:#fff;border-radius:20px;box-shadow:var(--shadow)}
    .stat-card{padding:22px}
    .stat-num{font-size:2rem;font-weight:800;color:var(--brand);line-height:1}
    .stat-label{color:var(--muted);margin-top:6px}
    .panel-header{
      padding:18px 20px;border-bottom:1px solid #edf2ee;
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap
    }
    .panel-body{padding:20px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}
    .search-box{position:relative;min-width:240px}
    .search-box i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
    .search-box input{padding-right:40px}
    .table thead th{
      background:#eff8f2;color:#185c3c;border-bottom:1px solid #d6e7dc;white-space:nowrap
    }
    .table td,.table th{text-align:center;vertical-align:middle}
    .badge-ok,.badge-bad,.badge-status{
      padding:6px 10px;border-radius:999px;font-weight:700;display:inline-block
    }
    .badge-ok{background:#dcfce7;color:#166534}
    .badge-bad{background:#fee2e2;color:#991b1b}
    .badge-status{background:#eef2ff;color:#4338ca}
    .empty-state{padding:36px 16px;text-align:center;color:var(--muted)}
    .toast-wrap{
      position:fixed;top:18px;left:18px;z-index:9999;display:flex;flex-direction:column;gap:10px
    }
    .mini-toast{
      background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 10px 26px rgba(0,0,0,.14);
      border-right:5px solid var(--brand);min-width:240px
    }
    .mini-toast.error{border-right-color:#dc3545}
    .mini-toast.warn{border-right-color:#f59e0b}
    .details-box{
      text-align:start;background:#fafdfb;border:1px solid #ebf1ed;border-radius:14px;padding:12px;min-width:220px
    }
    .footer-note{padding:18px 8px;text-align:center;color:var(--muted)}
    @media (max-width:768px){
      .panel-body,.panel-header{padding:16px}
    }
  </style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div class="shell">
    <header class="hero mb-4">
      <div class="d-flex flex-column flex-md-row align-items-center gap-3 text-center text-md-end">
        <div class="logo-box flex-shrink-0">
          <i class="fa-solid fa-user-shield"></i>
        </div>

        <div class="flex-grow-1">
          <h1 class="h3 fw-bold mb-1">لوحة المسؤول</h1>
          <div class="fs-5">مياس العالمية</div>
          <div>إدارة طلبات التسجيل والسجلات</div>
        </div>

        <div class="d-flex gap-2">
          <button id="logoutBtn" class="btn btn-light fw-bold">
            <i class="fa-solid fa-right-from-bracket me-1"></i>
            تسجيل الخروج
          </button>
        </div>
      </div>
    </header>

    <section class="row g-3 mb-4">
      <div class="col-12 col-md-3">
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">إجمالي الطلبات</div>
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="stat-card">
          <div class="stat-num" id="statEligible">0</div>
          <div class="stat-label">المؤهلون</div>
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="stat-card">
          <div class="stat-num" id="statNotEligible">0</div>
          <div class="stat-label">غير المؤهلين</div>
        </div>
      </div>
      <div class="col-12 col-md-3">
        <div class="stat-card">
          <div class="stat-num" id="statReviewed">0</div>
          <div class="stat-label">تمت المراجعة</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2 class="h5 m-0"><i class="fa-solid fa-table-list me-2"></i>طلبات التسجيل</h2>

        <div class="toolbar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="searchInput" class="form-control" type="text" placeholder="ابحث بالاسم أو الهاتف أو النتيجة أو الحالة">
          </div>

          <button id="refreshBtn" class="btn btn-outline-secondary">
            <i class="fa-solid fa-rotate me-1"></i>تحديث
          </button>

          <button id="excelBtn" class="btn btn-outline-success">
            <i class="fa-solid fa-file-excel me-1"></i>Excel
          </button>
        </div>
      </div>

      <div class="panel-body">
        <div class="table-responsive">
          <table class="table align-middle" id="recordsTable">
            <thead>
              <tr>
                <th>الاسم</th>
                <th>الميلاد</th>
                <th>المقابلة</th>
                <th>المشرفة</th>
                <th>الهاتف</th>
                <th>النتيجة</th>
                <th>الحالة</th>
                <th>التفاصيل</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state d-none">
          <div class="fs-1 mb-2"><i class="fa-regular fa-folder-open"></i></div>
          <div>لا توجد طلبات حالياً</div>
        </div>
      </div>
    </section>

    <div class="footer-note">جميع الحقوق محفوظة © مياس العالمية</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      deleteDoc,
      doc,
      updateDoc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { firebaseConfig, ADMIN_EMAILS } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const toastWrap = document.getElementById("toastWrap");
    const recordsBody = document.getElementById("recordsBody");
    const recordsTable = document.getElementById("recordsTable");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const refreshBtn = document.getElementById("refreshBtn");
    const excelBtn = document.getElementById("excelBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const statTotal = document.getElementById("statTotal");
    const statEligible = document.getElementById("statEligible");
    const statNotEligible = document.getElementById("statNotEligible");
    const statReviewed = document.getElementById("statReviewed");

    let registrations = [];

    function showToast(message, type = "success") {
      const el = document.createElement("div");
      el.className = `mini-toast ${type === "error" ? "error" : type === "warn" ? "warn" : ""}`;
      el.innerHTML = `<div class="fw-bold mb-1">${type === "error" ? "تنبيه" : "تم"}</div><div>${message}</div>`;
      toastWrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(-8px)";
        el.style.transition = "all .25s ease";
        setTimeout(() => el.remove(), 250);
      }, 3000);
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[s]));
    }

    function formatDate(value) {
      if (!value) return "-";
      return value;
    }

    function updateStats() {
      const total = registrations.length;
      const eligible = registrations.filter(r => r.result === "مؤهل").length;
      const notEligible = total - eligible;
      const reviewed = registrations.filter(r => r.status && r.status !== "new").length;

      statTotal.textContent = total;
      statEligible.textContent = eligible;
      statNotEligible.textContent = notEligible;
      statReviewed.textContent = reviewed;
    }

    function statusLabel(status) {
      const map = {
        new: "جديد",
        reviewed: "تمت المراجعة",
        accepted: "مقبول",
        rejected: "مرفوض"
      };
      return map[status] || status || "جديد";
    }

    function renderTable() {
      const q = searchInput.value.trim().toLowerCase();

      const filtered = registrations.filter(r => {
        const haystack = [
          r.studentName,
          r.birthdate,
          r.interviewDate,
          r.supervisor,
          r.phone,
          r.result,
          r.status,
          r.notes
        ].join(" ").toLowerCase();

        return haystack.includes(q);
      });

      recordsBody.innerHTML = "";

      if (!filtered.length) {
        recordsTable.classList.add("d-none");
        emptyState.classList.remove("d-none");
        return;
      }

      recordsTable.classList.remove("d-none");
      emptyState.classList.add("d-none");

      filtered.forEach(record => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${escapeHtml(record.studentName)}</td>
          <td>${formatDate(record.birthdate)}</td>
          <td>${formatDate(record.interviewDate)}</td>
          <td>${escapeHtml(record.supervisor)}</td>
          <td>${escapeHtml(record.phone)}</td>
          <td>
            <span class="${record.result === "مؤهل" ? "badge-ok" : "badge-bad"}">
              ${record.result || "-"}
            </span>
          </td>
          <td><span class="badge-status">${statusLabel(record.status)}</span></td>
          <td>
            <div class="details-box">
              <div><strong>ملاحظات:</strong> ${escapeHtml(record.notes || "-")}</div>
              <div class="mt-1"><strong>التوقيع:</strong> ${record.signature ? "موجود" : "غير موجود"}</div>
            </div>
          </td>
          <td>
            <div class="d-flex gap-2 justify-content-center flex-wrap">
              <button class="btn btn-sm btn-outline-primary" onclick="updateRegistrationStatus('${record.id}','reviewed')">مراجعة</button>
              <button class="btn btn-sm btn-outline-success" onclick="updateRegistrationStatus('${record.id}','accepted')">قبول</button>
              <button class="btn btn-sm btn-outline-warning" onclick="updateRegistrationStatus('${record.id}','rejected')">رفض</button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteRegistration('${record.id}')">حذف</button>
            </div>
          </td>
        `;

        recordsBody.appendChild(tr);
      });
    }

    async function loadRegistrations() {
      try {
        const qRef = query(collection(db, "registrations"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(qRef);

        registrations = snapshot.docs.map(d => ({
          id: d.id,
          ...d.data()
        }));

        updateStats();
        renderTable();
      } catch (error) {
        console.error(error);
        showToast("تعذر تحميل البيانات", "error");
      }
    }

    async function deleteRegistration(id) {
      const ok = confirm("هل تريد حذف هذا الطلب؟");
      if (!ok) return;

      try {
        await deleteDoc(doc(db, "registrations", id));
        registrations = registrations.filter(r => r.id !== id);
        updateStats();
        renderTable();
        showToast("تم حذف الطلب", "warn");
      } catch (error) {
        console.error(error);
        showToast("تعذر حذف الطلب", "error");
      }
    }

    async function updateRegistrationStatus(id, status) {
      try {
        await updateDoc(doc(db, "registrations", id), { status });
        const item = registrations.find(r => r.id === id);
        if (item) item.status = status;
        updateStats();
        renderTable();
        showToast("تم تحديث الحالة");
      } catch (error) {
        console.error(error);
        showToast("تعذر تحديث الحالة", "error");
      }
    }

    function exportExcel() {
      if (!registrations.length) {
        showToast("لا توجد بيانات للتصدير", "warn");
        return;
      }

      const exportData = registrations.map((r, i) => ({
        "#": i + 1,
        "الاسم": r.studentName || "",
        "تاريخ الميلاد": r.birthdate || "",
        "تاريخ المقابلة": r.interviewDate || "",
        "المشرفة": r.supervisor || "",
        "الهاتف": r.phone || "",
        "النتيجة": r.result || "",
        "الحالة": statusLabel(r.status),
        "الملاحظات": r.notes || ""
      }));

      const ws = XLSX.utils.json_to_sheet(exportData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "registrations");
      XLSX.writeFile(wb, "registrations.xlsx");

      showToast("تم تصدير ملف Excel");
    }

    searchInput.addEventListener("input", renderTable);
    refreshBtn.addEventListener("click", loadRegistrations);
    excelBtn.addEventListener("click", exportExcel);

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "login.html";
      } catch (error) {
        console.error(error);
        showToast("تعذر تسجيل الخروج", "error");
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const email = (user.email || "").toLowerCase();
      if (!ADMIN_EMAILS.map(e => e.toLowerCase()).includes(email)) {
        await signOut(auth);
        window.location.href = "login.html";
        return;
      }

      loadRegistrations();
    });

    window.deleteRegistration = deleteRegistration;
    window.updateRegistrationStatus = updateRegistrationStatus;
  </script>
</body>
</html>
